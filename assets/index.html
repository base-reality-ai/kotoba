<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Matter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  #status { background: #333; padding: 4px 12px; font-size: 12px; color: #aaa; display: flex; gap: 16px; align-items: center; }
  #status .model { color: #7eb8f7; }
  #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 4px; max-width: 90%; white-space: pre-wrap; line-height: 1.5; }
  .user { background: #2a4a2a; align-self: flex-end; color: #90ee90; }
  .assistant { background: #1e2a3a; align-self: flex-start; }
  .tool-call { background: #2a2a1e; color: #cccc66; font-size: 12px; padding: 4px 8px; border-left: 2px solid #666633; align-self: flex-start; }
  .tool-done { background: #1e2a1e; color: #888; font-size: 12px; padding: 4px 8px; align-self: flex-start; }
  .tool-error { background: #2a1e1e; color: #ee6666; font-size: 12px; padding: 4px 8px; border-left: 2px solid #993333; align-self: flex-start; }
  .diff-block { background: #111; padding: 8px; font-size: 12px; border-radius: 4px; overflow-x: auto; align-self: flex-start; max-width: 100%; }
  .diff-block .add { color: #66ee66; }
  .diff-block .del { color: #ee6666; }
  .diff-block .hunk { color: #6699cc; }
  .error-msg { background: #2a1e1e; color: #ff8888; border-left: 3px solid #cc4444; padding: 8px 12px; align-self: flex-start; }
  .streaming { border-bottom: 2px solid #7eb8f7; }
  .thinking { color: #888; font-style: italic; }
  .tool-output { background: #1a1a2a; color: #8888cc; font-size: 11px; padding: 2px 8px; align-self: flex-start; font-family: monospace; border-left: 1px solid #444466; }
  .msg pre { background: #111; padding: 8px; border-radius: 4px; overflow-x: auto; margin: 4px 0; }
  .msg code { font-family: monospace; font-size: 0.9em; }
  .msg pre code { background: none; padding: 0; }
  .msg h3, .msg h4 { color: #7ec8e3; margin: 6px 0 2px; font-size: 0.95rem; }
  .msg li { margin-left: 16px; list-style: disc; }
  .msg strong { color: #e0e0e0; }
  .msg em { color: #ccc; font-style: italic; }
  .msg p { margin: 2px 0; }
  #input-area { display: flex; padding: 8px; gap: 8px; background: #222; }
  #input { flex: 1; background: #333; border: 1px solid #555; color: #e0e0e0; padding: 8px; font-family: monospace; font-size: 14px; border-radius: 4px; resize: none; min-height: 40px; max-height: 200px; }
  #send { background: #2a4a7a; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: monospace; }
  #send:hover { background: #3a5a9a; }
  #send:disabled { opacity: 0.4; cursor: default; }
  #cancel-btn { background: #4a2a2a; color: #ff8888; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: monospace; display: none; }
  #cancel-btn:hover { background: #6a3a3a; }
</style>
</head>
<body>
<div id="status">
  <span>Dark Matter</span>
  <span class="model" id="model-label">connecting…</span>
  <select id="model-select" style="background:#2a3a4a;color:#7eb8f7;border:1px solid #555;border-radius:3px;font-family:monospace;font-size:11px;padding:1px 4px;display:none;max-width:180px;cursor:pointer" title="Switch model"></select>
  <span id="token-count"></span>
  <span id="busy-indicator"></span>
  <span id="gpu-pill" style="display:none">
    GPU <span id="gpu-util">--</span>% · <span id="gpu-vram">--</span> · <span id="gpu-temp">--</span>°C
  </span>
  <span id="perf-pill" style="display:none"><span id="perf-tps">--</span> tok/s</span>
  <span id="ctx-pill" style="display:none">CTX <span id="ctx-pct" style="color:#7eb8f7">--%</span></span>
  <button id="share-btn" onclick="shareSession()" style="margin-left:auto;background:#2a3a4a;color:#aac8f0;border:none;padding:2px 10px;border-radius:3px;cursor:pointer;font-family:monospace;font-size:11px;" title="Export session as HTML">⬇ export</button>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" placeholder="Message dm… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
  <button id="cancel-btn" onclick="cancelTurn()">Cancel</button>
  <button id="send">Send</button>
</div>
<script>
const messagesEl = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const cancelBtn = document.getElementById('cancel-btn');
const modelLabel = document.getElementById('model-label');
const tokenCount = document.getElementById('token-count');
const busyIndicator = document.getElementById('busy-indicator');

const modelSelect = document.getElementById('model-select');

let streaming = null;
let busy = false;
let spinTimer = null;

async function loadModels() {
  try {
    const resp = await fetch('/api/models');
    const data = await resp.json();
    if (!data.ok || !data.models || !data.models.length) return;
    modelSelect.innerHTML = '';
    data.models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name || m.model;
      opt.textContent = opt.value;
      if (opt.value === data.active_model) opt.selected = true;
      modelSelect.appendChild(opt);
    });
    modelSelect.style.display = '';
  } catch (_) {}
}

modelSelect.addEventListener('change', async () => {
  const model = modelSelect.value;
  try {
    const resp = await fetch('/api/model', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model}),
    });
    const data = await resp.json();
    if (data.ok) {
      modelLabel.textContent = model + ' · ' + (modelLabel.textContent.split(' · ')[1] || '');
    }
  } catch (_) {}
});

loadModels();

function setBusy(b) {
  busy = b;
  sendBtn.disabled = b;
  cancelBtn.style.display = b ? 'block' : 'none';
  if (b) {
    const frames = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
    let i = 0;
    busyIndicator.textContent = frames[0] + ' thinking…';
    spinTimer = setInterval(() => {
      busyIndicator.textContent = frames[i++ % frames.length] + ' thinking…';
    }, 100);
  } else {
    clearInterval(spinTimer);
    busyIndicator.textContent = '';
  }
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMsg(cls, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function renderDiff(path, diff) {
  const wrap = document.createElement('div');
  wrap.className = 'diff-block';
  const header = document.createElement('div');
  header.style.cssText = 'color:#aaa;margin-bottom:4px;font-size:11px;';
  header.textContent = path;
  wrap.appendChild(header);
  diff.split('\n').forEach(line => {
    const span = document.createElement('span');
    span.style.display = 'block';
    span.className = line.startsWith('+') && !line.startsWith('+++') ? 'add'
                   : line.startsWith('-') && !line.startsWith('---') ? 'del'
                   : line.startsWith('@@') ? 'hunk' : '';
    span.textContent = line;
    wrap.appendChild(span);
  });
  messagesEl.appendChild(wrap);
  scrollBottom();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function inlineRender(s) {
  s = esc(s);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(?<!\w)\*([^*]+)\*(?!\w)/g, '<em>$1</em>');
  s = s.replace(/`([^`]+)`/g, '<code style="background:#2a2a2a;padding:1px 4px;border-radius:2px">$1</code>');
  return s;
}
function renderTable(rows, hasHeader) {
  if (!rows.length) return '';
  const parseRow = r => r.split('|').slice(1, -1).map(c => c.trim());
  let h = '<table style="border-collapse:collapse;margin:4px 0;font-size:0.9em;width:auto">';
  const startIdx = hasHeader ? 1 : 0;
  if (hasHeader && rows.length > 0) {
    h += '<thead><tr>';
    parseRow(rows[0]).forEach(c => { h += '<th style="border:1px solid #444;padding:4px 8px;background:#252525;color:#7ec8e3">' + inlineRender(c) + '</th>'; });
    h += '</tr></thead>';
  }
  h += '<tbody>';
  for (let i = startIdx; i < rows.length; i++) {
    h += '<tr>';
    parseRow(rows[i]).forEach(c => { h += '<td style="border:1px solid #333;padding:4px 8px">' + inlineRender(c) + '</td>'; });
    h += '</tr>';
  }
  h += '</tbody></table>';
  return h;
}
function renderMarkdown(text) {
  let html = '', inFence = false, fenceLang = '', fenceBuf = '';
  let inList = false, listType = '';
  let inTable = false, tableRows = [], tableHasHeader = false;
  function closeList() { if (inList) { html += '</' + listType + '>\n'; inList = false; listType = ''; } }
  function closeTable() { if (inTable) { html += renderTable(tableRows, tableHasHeader); inTable = false; tableRows = []; tableHasHeader = false; } }
  for (const line of text.split('\n')) {
    if (line.startsWith('```')) {
      closeList(); closeTable();
      if (inFence) {
        html += '<pre><code class="lang-' + esc(fenceLang) + '">' + esc(fenceBuf.trimEnd()) + '</code></pre>\n';
        fenceBuf = ''; fenceLang = ''; inFence = false;
      } else { fenceLang = line.slice(3).trim(); inFence = true; }
      continue;
    }
    if (inFence) { fenceBuf += line + '\n'; continue; }
    const trimmed = line.trim();
    if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
      closeList();
      if (!inTable) { inTable = true; tableRows = []; tableHasHeader = false; }
      if (/^\|[\s\-:|]+\|$/.test(trimmed)) { tableHasHeader = true; }
      else { tableRows.push(trimmed); }
      continue;
    }
    closeTable();
    if (line.startsWith('### ')) { closeList(); html += '<h4>' + inlineRender(line.slice(4)) + '</h4>\n';
    } else if (line.startsWith('## ')) { closeList(); html += '<h3>' + inlineRender(line.slice(3)) + '</h3>\n';
    } else if (line.startsWith('# ')) { closeList(); html += '<h3>' + inlineRender(line.slice(2)) + '</h3>\n';
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      if (!inList || listType !== 'ul') { closeList(); html += '<ul>'; inList = true; listType = 'ul'; }
      html += '<li>' + inlineRender(line.slice(2)) + '</li>\n';
    } else if (/^\d+\.\s/.test(line)) {
      if (!inList || listType !== 'ol') { closeList(); html += '<ol>'; inList = true; listType = 'ol'; }
      html += '<li>' + inlineRender(line.replace(/^\d+\.\s/, '')) + '</li>\n';
    } else {
      closeList();
      if (trimmed === '') { html += '<br>\n'; }
      else { html += '<p style="margin:2px 0">' + inlineRender(line) + '</p>\n'; }
    }
  }
  closeList(); closeTable();
  if (inFence && fenceBuf) {
    html += '<pre><code class="lang-' + esc(fenceLang) + '">' + esc(fenceBuf.trimEnd()) + '</code></pre>\n';
  }
  return html;
}

const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const wsUrl = `${protocol}//${location.host}/ws`;
let ws = null;
let reconnectDelay = 1000;
const MAX_RECONNECT_DELAY = 30000;
let wasConnected = false;

function connectWs() {
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    reconnectDelay = 1000;
    if (wasConnected) {
      addMsg('tool-done', '[reconnected]');
    }
    wasConnected = true;
  };

  ws.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    switch (ev.type) {
      case 'init':
        modelLabel.textContent = ev.model + ' · ' + ev.session_id.slice(0, 8);
        break;
      case 'thinking':
        if (!streaming) {
          streaming = addMsg('assistant streaming thinking', '');
        }
        streaming.textContent += ev.content;
        scrollBottom();
        break;
      case 'token':
        if (streaming && streaming.classList.contains('thinking')) {
          streaming.classList.remove('streaming');
          streaming = null;
        }
        if (!streaming) {
          streaming = addMsg('assistant streaming', '');
        }
        streaming.textContent += ev.content;
        scrollBottom();
        break;
      case 'done':
        if (streaming) {
          const raw = streaming.textContent;
          streaming.innerHTML = renderMarkdown(raw);
          streaming.style.whiteSpace = 'normal';
          streaming.classList.remove('streaming');
          streaming = null;
        }
        break;
      case 'tool_start':
        addMsg('tool-call', `[${ev.name}] ${JSON.stringify(ev.args).slice(0, 120)}`);
        break;
      case 'tool_done':
        addMsg(ev.is_error ? 'tool-error' : 'tool-done',
               `[${ev.name}] ${(ev.output || '').slice(0, 300)}`);
        break;
      case 'diff':
        renderDiff(ev.path, ev.diff);
        break;
      case 'error':
        if (streaming) { streaming.classList.remove('streaming'); streaming = null; }
        addMsg('error-msg', 'Error: ' + ev.message);
        setBusy(false);
        break;
      case 'turn_complete':
        tokenCount.textContent =
          `~${(((ev.prompt_tokens || 0) + (ev.completion_tokens || 0)) / 1000).toFixed(1)}k tok`;
        setBusy(false);
        break;
      case 'cancelled':
        if (streaming) { streaming.classList.remove('streaming'); streaming = null; }
        setBusy(false);
        addMsg('tool-done', '[cancelled]');
        break;
      case 'title':
        document.title = 'dm — ' + ev.title;
        break;
      case 'context_warning':
        addMsg('error-msg', '⚠ ' + ev.message);
        break;
      case 'ctx_usage': {
        const pill = document.getElementById('ctx-pill');
        const pctEl = document.getElementById('ctx-pct');
        pill.style.display = '';
        pctEl.textContent = ev.pct + '%';
        pctEl.style.color = ev.pct >= 95 ? '#f38ba8' : ev.pct >= 80 ? '#f9e2af' : '#7eb8f7';
        break;
      }
      case 'turn_started':
        setBusy(true);
        break;
      case 'agent_spawned':
        addMsg('tool-call', `[agent:${ev.depth}] ${(ev.prompt_preview || '').slice(0, 120)}`);
        break;
      case 'agent_finished':
        addMsg('tool-done', `[agent:${ev.depth}] done in ${(ev.elapsed_ms / 1000).toFixed(1)}s`);
        break;
      case 'tool_output':
        addMsg('tool-output', `  ${ev.line}`);
        break;
      case 'perf_update': {
        const pill = document.getElementById('perf-pill');
        pill.style.display = '';
        document.getElementById('perf-tps').textContent = ev.tok_per_sec.toFixed(1);
        tokenCount.textContent = `${(ev.total_tokens / 1000).toFixed(1)}k tok`;
        break;
      }
      case 'context_pruned':
        addMsg('tool-done', `[context pruned] ${(ev.chars_removed / 1000).toFixed(0)}k chars across ${ev.messages_affected} messages`);
        break;
      case 'changeset_applied':
        addMsg('tool-done', `[changeset applied] ${ev.files} file(s)`);
        break;
      case 'gpu_update': {
        document.getElementById('gpu-pill').style.display = '';
        const u = document.getElementById('gpu-util');
        u.textContent = ev.util_pct;
        u.style.color = ev.util_pct >= 90 ? '#f38ba8' : ev.util_pct >= 60 ? '#f9e2af' : '#a6e3a1';
        document.getElementById('gpu-vram').textContent =
            ev.vram_total_mb >= 1024
                ? (ev.vram_used_mb/1024).toFixed(1) + '/' + Math.round(ev.vram_total_mb/1024) + 'gb'
                : ev.vram_used_mb + '/' + ev.vram_total_mb + 'mb';
        const t = document.getElementById('gpu-temp');
        if (ev.temp_c !== null) {
            t.textContent = ev.temp_c;
            t.parentElement.querySelector('#gpu-temp').previousSibling.textContent = ' · ';
        } else {
            t.style.display = 'none';
        }
        break;
      }
    }
  };

  ws.onclose = () => {
    modelLabel.textContent = 'reconnecting...';
    setBusy(false);
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
      connectWs();
    }, reconnectDelay);
  };

  ws.onerror = () => {};
}

connectWs();

async function sendMessage() {
  const text = input.value.trim();
  if (!text || busy) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addMsg('error-msg', 'Not connected — waiting for reconnect...');
    return;
  }
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  setBusy(true);
  await fetch('/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text}),
  });
}

async function cancelTurn() {
  await fetch('/cancel', {method: 'POST'});
}

async function shareSession() {
  const resp = await fetch('/share', {method: 'POST'});
  if (!resp.ok) { addMsg('error-msg', 'Export failed: ' + await resp.text()); return; }
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'dm-session.html';
  a.click();
  URL.revokeObjectURL(url);
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});
</script>
</body>
</html>
